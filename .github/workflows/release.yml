name: Release

on:
  push:
    tags:
      - "v*" # triggers on v0.2.0, v1.0.0, etc.

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write # needed to create GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build & sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: "theball-signing-2024"
          # Pass through your app env vars
          VITE_TURSO_DB_URL: ${{ secrets.VITE_TURSO_DB_URL }}
          VITE_TURSO_DB_TOKEN: ${{ secrets.VITE_TURSO_DB_TOKEN }}
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_ASSEMBLYAI_API_KEY: ${{ secrets.VITE_ASSEMBLYAI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "The Ball ${{ github.ref_name }}"
          releaseBody: "See the changelog for details."
          releaseDraft: false
          prerelease: false
          # Generates latest.json update manifest automatically
          updaterJsonKeepUniversal: true
